- type: language
  id: RaiderSpeak
  isVisibleLanguage: true
  speech:
    color: "#656565aa"
    fontId: Soviet
    boldFontId: SovietBold
  obfuscation:
    !type:PhraseObfuscation
    proportion: 0.66
    minPhrases: 1
    maxPhrases: 6
    replacement:
    - гойда
    - слон
    - набег
    - хз
    - умрешь
    - прив
    - нахуй
    - блять
    - сука
    - иншаллах
    - товарищ
    - манго
    - ZOV
    - наш
    - овца
    - овцебык
    - водка
    - запад
    - козел

- type: trait
  id: RaiderSpeak
  name: trait-language-raiderspeak-name
  description: trait-language-raiderspeak-desc
  category: LanguageTraits
  cost: 3
  blacklist:
    components:
    - BorgChassis
  components:
  - type: LanguageSpeaker
  languagesSpoken:
  - RaiderSpeak
  languagesUnderstood:
  - RaiderSpeak

- type: entity
  parent: BaseLanguageKnowledge
  id: LanguageRaiderSpeak
  components:
  - type: LanguageKnowledge
    languageId: RaiderSpeak

- type: entity
  id: RaiderSpeakTranslator
  parent: [ TranslatorPoweredBase ]
  name: raiderspeak translator
  description: Translates speech between Raiderspeak and Galactic Common. Like a true raider!
  components:
  - type: HandheldTranslator
    spoken:
    - TauCetiBasic
    - RaiderSpeak
    understood:
    - TauCetiBasic
    - RaiderSpeak
    requires:
    - TauCetiBasic
    - RaiderSpeak

- type: entity
  parent: BaseSubdermalImplant
  id: RaiderSpeakTranslatorImplant
  name: raiderspeak translator implant
  description: An implant giving the ability to understand and speak Raiderspeak. гойда!
  categories: [ HideSpawnMenu ]
  components:
  - type: KnowledgeGrantOnWear
    skills:
      LanguageRaiderSpeak: 65

- type: font
  id: Soviet
  path: "/Fonts/_Mango/Soviet/Red October.ttf"

- type: font
  id: SovietBold
  path: "/Fonts/_Mango/Soviet/Red October-Fat.ttf"
