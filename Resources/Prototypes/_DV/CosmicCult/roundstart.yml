- type: entity
  parent: BaseGameRule
  id: CosmicCult
  components:
  # inky
  - type: DynamicRuleCost
    cost: 225
  # /inky
  - type: CosmicCultRule
  - type: LoadMapRule
    mapPath: /Maps/_DV/Nonstations/cosmicvoid.yml
  - type: GameRule
    minPlayers: 20
  - type: AntagObjectives
    objectives:
    - CosmicFinalityObjective
    - CosmicMonumentObjective
    - CosmicEntropyObjective
  - type: AntagSelection
    definitions:
    - prefRoles: [ CosmicAntagCultist ]
      min: 3
      max: 8
      playerRatio: 7
      jobBlacklist: [ Chaplain ] # GOOBSTATION
      blacklist:
        components:
        - CommandStaff # GOOBSTATION
        - AntagImmune
        - BibleUser
      components:
      - type: CosmicCult
      mindRoles:
      - MindRoleCosmicCult
  - type: AntagPlayerEffects
    effects:
    - !type:GrantSkills
      skills:
        MeleeKnowledge: 60 # They like, only have melee weapons
