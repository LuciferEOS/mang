- type: reagent
  id: Methanol
  name: reagent-name-methanol
  group: Pyrotechnic
  desc: reagent-desc-methanol
  physicalDesc: reagent-physical-desc-pungent
  color: "#c4f5ff"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types: # methanol is bad for your health
            Poison: 3

- type: reagent
  id: Hexamine
  name: reagent-name-hexamine
  group: Pyrotechnic
  desc: reagent-desc-hexamine
  flavor: sweet
  physicalDesc: reagent-physical-desc-crystalline
  contrabandSeverity: Major # not explosive, but it's only use is for explosives
  color: white

- type: reagent
  id: Cyclonite
  name: reagent-name-cyclonite
  group: Pyrotechnic
  desc: reagent-desc-cyclonite
  flavor: nothing
  physicalDesc: reagent-physical-desc-crystalline
  contrabandSeverity: Major # you probably aren't making this or the other explosives with permission from HOS
  color: "#e0c009"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types: # do not eat/shoot up C4
            Poison: 3

- type: reagent
  id: AmmoniumNitrateFuelOil
  name: reagent-name-ammonium-nitrate-fuel-oil
  group: Pyrotechnic
  desc: reagent-desc-ammonium-nitrate-fuel-oil
  flavor: nothing
  physicalDesc: reagent-physical-desc-odorless
  contrabandSeverity: Major
  color: white
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types: # Oil is not good
            Poison: 1

- type: reagent
  id: Octogen
  name: reagent-name-octogen
  group: Pyrotechnic
  desc: reagent-desc-octogen
  flavor: nothing
  physicalDesc: reagent-physical-desc-crystalline
  contrabandSeverity: Major
  color: white
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types: # do not eat C4's bigger brother
            Poison: 2

- type: reagent
  id: Burnite
  name: reagent-name-burnite
  group: Pyrotechnic
  desc: reagent-desc-burnite
  physicalDesc: reagent-physical-desc-odorless
  contrabandSeverity: Major
  color: white
  tileReactions:
  - !type:CreateEntityTileReaction
    entity: MolotovFire
    maxOnTileWhitelist:
      tags: [ TraumaFire ]
  - !type:FlammableTileReaction
    temperatureMultiplier: 5
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Heat: 1
            Poison: 1
      - !type:AdjustTemperature
        amount: 6000
      - !type:Flammable
        multiplier: 0.4
      - !type:Ignite
  reactiveEffects:
    Flammable:
      methods: [ Touch ]
      effects:
      - !type:Flammable
        multiplier: 0.3
      - !type:Ignite
      - !type:PopupMessage
        messages: [ "clf3-it-burns", "clf3-get-away" ] # just copy and pasted from clf3 why not
        visualType: MediumCaution
        probability: 0.3
        type: Local
