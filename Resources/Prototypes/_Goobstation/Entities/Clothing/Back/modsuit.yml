- type: entity
  parent: [ClothingModsuitStandardNoStorage, ContentsExplosionResistanceBase]
  id: ClothingModsuitStandard
  components:
  - type: Storage
    grid:
    - 0,0,1,3
    - 3,0,6,3
    - 8,0,9,3
    maxItemSize: Huge
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
      toggleable-clothing: !type:Container
      cell_slot: !type:ContainerSlot
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface

- type: entity
  abstract: true
  parent: Clothing
  id: ClothingModsuitStandardNoStorage
  name: standard modsuit control unit
  description: A special modular suit contol unit containing all necessary modular hardsuit parts.
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Goobstation/Clothing/Back/Modsuits/standard.rsi
    layers:
    - state: control
  - type: Item
    size: Ginormous
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      toggleable-clothing: !type:Container
      cell_slot: !type:ContainerSlot
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface
  - type: UseDelay
    delay: 0.5
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: ToggleableClothing
    requiredSlot: back
    blockUnequipWhenAttached: false # easier to use and now its fixed
    replaceCurrentClothing: true
    clothingPrototypes:
      head: ClothingModsuitHelmetStandard
      gloves: ClothingModsuitGauntletsStandard
      outerClothing: ClothingModsuitChestplateStandard
      shoes: ClothingModsuitBootsStandard
  - type: WiresPanel
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        whitelist:
          components:
          - PowerCell
  - type: ItemSlotsRequirePanel
    slots:
      cell_slot: true
  - type: PowerCellDraw
    enabled: false # disabled until you seal the suit
    drawRate: 0.8 # Sealed draw rate
    useCharge: 4 # Charge used when sealing
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: false
  - type: DoAfter
  - type: SealableClothingControl
  - type: SealableClothingRequiresPower
  - type: Construction
    graph: Modsuit
    node: standard
  - type: ClothingSpeedModifier
    sprintModifier: 0.95
    walkModifier: 0.95
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      back:
      - state: equipped-BACKPACK-sealed

- type: entity
  abstract: true
  id: BaseModsuitBattery
  suffix: High-Capacity Battery
  components:
  - type: ContainerFill
    containers:
      cell_slot:
      - PowerCellHigh

- type: entity
  parent: [ ClothingModsuitStandard, BaseModsuitBattery ]
  id: ClothingModsuitStandardPowerCell

